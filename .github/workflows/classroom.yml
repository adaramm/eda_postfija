name: Autograding Tests
on:
  - push
  - workflow_dispatch
  - repository_dispatch
permissions:
  checks: write
  actions: read
  contents: read
jobs:
  run-autograding-tests:
    runs-on: ubuntu-latest
    if: github.actor != 'github-classroom[bot]'
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      - name: Install GCC
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc

      - name: Compile project
        run: |
          gcc \
            src/pila.c \
            src/cola.c \
            src/parser.c \
            src/evaluator.c \
            tests/test_runner.c \
            -Iinclude \
            -lm \
            -o test_runner

      - name: Run tests
        run: ./test_runner